          <stop offset="0%" stop-color="#0d2a1a"/>
          <stop offset="100%" stop-color="#1a4a2a"/>
        </linearGradient>
      </defs>
      <rect width="400" height="240" fill="url(#bgEst)"/>
      <!-- Decorative circles -->
      <circle cx="350" cy="40" r="80" fill="#1a5a30" opacity=".3"/>
      <circle cx="50" cy="200" r="70" fill="#0d3a1a" opacity=".4"/>
