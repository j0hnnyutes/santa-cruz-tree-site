      <rect x="125" y="188" width="150" height="16" rx="4" fill="#3a9040"/>
      <text x="200" y="199" text-anchor="middle" font-size="9" fill="#fff" font-family="sans-serif" font-weight="bold">FREE ESTIMATE</text>
      <!-- Arborist character -->
      <circle cx="55" cy="90" r="28" fill="#e8b870"/>
