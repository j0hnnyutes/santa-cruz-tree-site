      <rect x="110" y="40" width="180" height="170" rx="10" fill="#f5f0e8"/>
      <rect x="130" y="30" width="140" height="22" rx="8" fill="#888"/>
      <rect x="148" y="26" width="104" height="22" rx="6" fill="#aaa"/>
