      <rect x="125" y="68" width="150" height="12" rx="3" fill="#ddd"/>
      <rect x="125" y="86" width="120" height="10" rx="3" fill="#e8e0d0"/>
      <rect x="125" y="100" width="140" height="10" rx="3" fill="#e8e0d0"/>
      <rect x="125" y="114" width="100" height="10" rx="3" fill="#e8e0d0"/>
      <!-- Checkboxes -->
      <rect x="125" y="132" width="12" height="12" rx="2" fill="none" stroke="#3a9040" stroke-width="2"/>
      <path d="M 127 138 L 130 141 L 136 135" stroke="#3a9040" stroke-width="2" fill="none" stroke-linecap="round"/>
      <rect x="125" y="150" width="12" height="12" rx="2" fill="none" stroke="#3a9040" stroke-width="2"/>
      <path d="M 127 156 L 130 159 L 136 153" stroke="#3a9040" stroke-width="2" fill="none" stroke-linecap="round"/>
      <rect x="125" y="168" width="12" height="12" rx="2" fill="none" stroke="#bbb" stroke-width="2"/>
      <rect x="143" y="134" width="80" height="8" rx="2" fill="#ddd"/>
      <rect x="143" y="152" width="90" height="8" rx="2" fill="#ddd"/>
      <rect x="143" y="170" width="70" height="8" rx="2" fill="#ddd"/>
